<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>실버패스 - 쉬운 원격 주문</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0.9); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-100 h-screen flex justify-center">

    <!-- 모바일 프레임 시뮬레이터 (웹 접속 시 중앙 배치) -->
    <div id="app-container" class="w-full max-w-md bg-white h-screen shadow-2xl overflow-hidden flex flex-col relative">
        
        <!-- 화면 렌더링 영역 -->
        <div id="screen-content" class="flex-1 overflow-hidden"></div>

    </div>

    <script>
        // 앱 상태 관리
        let state = {
            view: 'landing',
            selectedCategory: '추천',
            cart: [],
            isSpeaking: false
        };

        const categories = ['추천', '햄버거', '음료', '디저트'];
        const menuItems = [
            { id: 1, name: '불고기 버거', price: 4500, category: '추천', img: '🍔' },
            { id: 2, name: '새우 버거', price: 5200, category: '햄버거', img: '🥪' },
            { id: 3, name: '콜라', price: 2000, category: '음료', img: '🥤' },
            { id: 4, name: '감자튀김', price: 1500, category: '추천', img: '🍟' },
            { id: 5, name: '바닐라 쉐이크', price: 3000, category: '디저트', img: '🍦' },
        ];

        // 음성 안내 기능
        function speak(text) {
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ko-KR';
            utterance.rate = 0.85; // 어르신들을 위해 조금 느리게
            window.speechSynthesis.speak(utterance);
        }

        // 화면 전환 함수
        function navigate(viewName) {
            state.view = viewName;
            render();
            window.scrollTo(0, 0);
        }

        // 장바구니 기능
        function addToCart(item) {
            const existing = state.cart.find(i => i.id === item.id);
            if (existing) {
                existing.quantity += 1;
            } else {
                state.cart.push({ ...item, quantity: 1 });
            }
            speak(item.name + " 한 개 담았습니다.");
            render();
        }

        function removeFromCart(id) {
            state.cart = state.cart.filter(i => i.id !== id);
            render();
        }

        // 렌더링 엔진
        function render() {
            const content = document.getElementById('screen-content');
            
            if (state.view === 'landing') {
                content.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full p-8 bg-blue-50 text-center animate-pop">
                        <div class="w-24 h-24 bg-blue-600 rounded-[2rem] flex items-center justify-center mb-8 shadow-xl">
                            <i data-lucide="smartphone" class="w-12 h-12 text-white"></i>
                        </div>
                        <h1 class="text-5xl font-black text-slate-800 mb-4 tracking-tight">실버패스</h1>
                        <p class="text-2xl text-slate-600 mb-12 leading-snug font-medium">어려운 키오스크 대신<br>내 폰으로 편하게 주문하세요.</p>
                        
                        <button onclick="navigate('qr-scan'); speak('키오스크의 큐알 코드를 비춰주세요.');" 
                            class="w-full bg-blue-600 text-white text-3xl font-black py-10 rounded-[2.5rem] shadow-2xl flex flex-col items-center gap-4 active:scale-95 transition-all">
                            <i data-lucide="qr-code" class="w-12 h-12"></i>
                            주문 시작하기
                        </button>
                        
                        <button class="mt-8 flex items-center gap-2 text-slate-500 font-bold text-xl px-6 py-3 border-2 border-slate-200 rounded-2xl">
                            <i data-lucide="user-check"></i> 직원의 도움 받기
                        </button>
                    </div>
                `;
            } 
            else if (state.view === 'qr-scan') {
                content.innerHTML = `
                    <div class="relative h-full bg-black flex flex-col items-center pt-24 text-center px-6">
                        <div class="text-white text-3xl font-black mb-12 leading-tight">
                            키오스크 화면의<br><span class="text-blue-400">QR코드</span>를 맞춰주세요
                        </div>
                        <div class="w-72 h-72 border-4 border-blue-500 rounded-[3rem] relative animate-pulse flex items-center justify-center bg-blue-500/10">
                            <div class="absolute -top-2 -left-2 w-16 h-16 border-t-[12px] border-l-[12px] border-blue-500 rounded-tl-3xl"></div>
                            <div class="absolute -top-2 -right-2 w-16 h-16 border-t-[12px] border-r-[12px] border-blue-500 rounded-tr-3xl"></div>
                            <div class="absolute -bottom-2 -left-2 w-16 h-16 border-b-[12px] border-l-[12px] border-blue-500 rounded-bl-3xl"></div>
                            <div class="absolute -bottom-2 -right-2 w-16 h-16 border-b-[12px] border-r-[12px] border-blue-500 rounded-br-3xl"></div>
                            <i data-lucide="scan" class="w-24 h-24 text-blue-500/30"></i>
                        </div>
                        <button onclick="navigate('landing')" class="mt-24 text-white/50 underline text-xl font-bold">취소하고 돌아가기</button>
                    </div>
                `;
                // 시뮬레이션: 1.5초 후 연결
                setTimeout(() => {
                    if(state.view === 'qr-scan') {
                        navigate('menu-list');
                        speak("연결되었습니다. 드시고 싶은 음식을 골라주세요.");
                    }
                }, 1800);
            }
            else if (state.view === 'menu-list') {
                const totalPrice = state.cart.reduce((s, i) => s + (i.price * i.quantity), 0);
                content.innerHTML = `
                    <div class="h-full bg-slate-50 flex flex-col animate-pop">
                        <header class="bg-white p-6 shadow-sm border-b-2 border-slate-100 flex items-center justify-between">
                            <h2 class="text-3xl font-black text-slate-800 tracking-tight">메뉴 고르기</h2>
                            <i data-lucide="volume-2" class="text-blue-600 w-8 h-8"></i>
                        </header>
                        
                        <div class="flex overflow-x-auto p-4 gap-3 bg-white no-scrollbar border-b shadow-inner">
                            ${categories.map(cat => `
                                <button onclick="state.selectedCategory='${cat}'; speak('${cat} 메뉴입니다.'); render();" 
                                    class="px-10 py-5 rounded-3xl text-2xl font-black whitespace-nowrap transition-all ${state.selectedCategory === cat ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-100 text-slate-400'}">
                                    ${cat}
                                </button>
                            `).join('')}
                        </div>

                        <div class="flex-1 overflow-y-auto p-4 space-y-6">
                            ${menuItems.filter(item => item.category === state.selectedCategory).map(item => `
                                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm flex items-center justify-between border-2 border-slate-100 active:border-blue-400 transition-all">
                                    <div class="flex items-center gap-6">
                                        <span class="text-7xl">${item.img}</span>
                                        <div>
                                            <h3 class="text-3xl font-bold text-slate-800 mb-1">${item.name}</h3>
                                            <p class="text-2xl text-blue-600 font-black">${item.price.toLocaleString()}원</p>
                                        </div>
                                    </div>
                                    <button onclick="addToCart(${JSON.stringify(item).replace(/"/g, '&quot;')})" 
                                        class="bg-blue-600 text-white w-20 h-20 rounded-3xl font-black text-4xl shadow-lg active:scale-90 transition-transform">
                                        +
                                    </button>
                                </div>
                            `).join('')}
                        </div>

                        ${state.cart.length > 0 ? `
                        <div class="p-6 bg-white border-t-4 border-blue-100 flex items-center justify-between shadow-[0_-10px_40px_rgba(0,0,0,0.1)] z-10 animate-pop">
                            <div class="flex flex-col">
                                <span class="text-xl font-bold text-slate-400">${state.cart.length}개 골랐음</span>
                                <span class="text-4xl font-black text-blue-600">${totalPrice.toLocaleString()}원</span>
                            </div>
                            <button onclick="navigate('cart'); speak('주문 내용을 확인해주세요.');" 
                                class="bg-blue-600 text-white px-12 py-7 rounded-[2rem] text-3xl font-black shadow-xl active:scale-95 transition-all">
                                주문하기
                            </button>
                        </div>
                        ` : ''}
                    </div>
                `;
            }
            else if (state.view === 'cart') {
                const totalPrice = state.cart.reduce((s, i) => s + (i.price * i.quantity), 0);
                content.innerHTML = `
                    <div class="h-full bg-slate-50 flex flex-col animate-pop">
                        <header class="bg-white p-6 shadow-sm flex items-center gap-6 border-b">
                            <button onclick="navigate('menu-list')" class="p-3 bg-slate-100 rounded-2xl text-slate-600"><i data-lucide="chevron-left" class="w-8 h-8"></i></button>
                            <h2 class="text-3xl font-black">담은 음식 확인</h2>
                        </header>

                        <div class="flex-1 p-6 overflow-y-auto space-y-4">
                            ${state.cart.map(item => `
                                <div class="bg-white p-6 rounded-[2rem] shadow-sm flex items-center justify-between">
                                    <h3 class="text-2xl font-black text-slate-700">${item.name} <span class="text-blue-600 ml-2">${item.quantity}개</span></h3>
                                    <button onclick="removeFromCart(${item.id})" class="text-red-500 font-bold text-xl px-5 py-3 border-2 border-red-50 text-red-400 rounded-2xl">빼기</button>
                                </div>
                            `).join('')}
                        </div>

                        <div class="p-8 bg-white rounded-t-[4rem] shadow-[0_-20px_50px_rgba(0,0,0,0.1)] space-y-5 z-20">
                            <div class="flex justify-between items-center mb-2 px-2">
                                <span class="text-2xl font-bold text-slate-400">낼 금액</span>
                                <span class="text-5xl font-black text-blue-600">${totalPrice.toLocaleString()}원</span>
                            </div>
                            
                            <button onclick="navigate('success'); speak('카운터 결제를 선택하셨습니다. 직원에게 카드를 건네주세요.');" 
                                class="w-full bg-orange-500 text-white py-9 rounded-[2.5rem] text-3xl font-black shadow-2xl flex flex-col items-center leading-tight active:scale-95 transition-all">
                                <span>카운터에서 카드결제</span>
                                <span class="text-lg font-medium opacity-80 mt-1">(직원에게 직접 카드 건네기)</span>
                            </button>

                            <button onclick="speak('자녀분에게 결제 요청 메시지를 보냈습니다.');"
                                class="w-full bg-yellow-400 text-slate-800 py-7 rounded-[2rem] text-2xl font-black shadow-md flex items-center justify-center gap-3 active:scale-95 transition-all">
                                <i data-lucide="user-plus"></i> 자녀가 대신 결제
                            </button>
                        </div>
                    </div>
                `;
            }
            else if (state.view === 'success') {
                content.innerHTML = `
                    <div class="h-full bg-blue-50 flex flex-col items-center justify-center p-10 text-center animate-pop">
                        <div class="w-40 h-40 bg-blue-600 rounded-full flex items-center justify-center text-white mb-10 animate-bounce shadow-2xl border-[12px] border-white">
                            <i data-lucide="check-circle" class="w-24 h-24"></i>
                        </div>
                        <h1 class="text-5xl font-black text-slate-800 mb-6">접수 완료!</h1>
                        <p class="text-2xl text-slate-600 mb-12 leading-relaxed font-medium">카운터로 이동하여<br><span class="text-orange-600 font-black text-3xl">카드를 직원에게 주세요.</span></p>
                        
                        <div class="bg-white w-full p-10 rounded-[3rem] shadow-2xl mb-12 border-4 border-blue-200">
                            <p class="text-2xl text-slate-400 font-bold mb-3">주문 번호</p>
                            <p class="text-8xl font-black text-blue-600 tracking-tighter">105</p>
                        </div>

                        <button onclick="state.cart=[]; navigate('landing');" 
                            class="w-full bg-slate-800 text-white py-7 rounded-[2rem] text-2xl font-black shadow-xl active:scale-95 transition-all">
                            처음으로 돌아가기
                        </button>
                    </div>
                `;
            }

            // 아이콘 렌더링
            lucide.createIcons();
        }

        // 초기 실행
        window.onload = () => {
            render();
        };
    </script>
</body>
</html>
